  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"vi\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>SHB Puzzle Challenge<\u002Ftitle>\n\n<style>\n@font-face{\n  font-family:'SHB Sans';\n  src:url(\"43d1e1b5-3efb-46a4-bfc7-114ce1629693\") format('truetype');\n  font-weight:400 900;\n  font-style:normal;\n  font-display:swap;\n}\n:root{\n  --navy:#302f7e;\n  --navy-2:#1f1e55;\n  --navy-3:#15143d;\n  --orange:#f36f21;\n  --orange-2:#d85a10;\n  --red:#f36f21; /* legacy alias → orange accent */\n  --dark:#0d0c2a;\n  --gray:#1b1a48;\n  --surface2:#272663;\n  --border:rgba(255,255,255,0.10);\n  --silver:#9b9bbf;\n  --gold:#f36f21;\n  --success:#22c55e;\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}\nhtml,body{width:100%;height:100%;overflow:hidden;touch-action:none;}\nbody{font-family:'SHB Sans','Segoe UI',sans-serif;background:var(--dark);color:#fff;font-weight:500;}\n.screen{display:none;width:100%;height:100vh;flex-direction:column;}\n.screen.active{display:flex;}\n\n/* HOME */\n#s-home{align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;gap:0;background:var(--dark);}\n#s-home::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(48,47,126,0.55) 0%,transparent 65%),radial-gradient(ellipse 70% 50% at 50% 100%,rgba(243,111,33,0.15) 0%,transparent 60%);}\n.home-logo{display:flex;align-items:center;gap:12px;margin-bottom:18px;z-index:1;width:100%;max-width:380px;}\n.home-logo img{height:42px;width:auto;display:block;flex-shrink:0;}\n.logo-divider{width:1px;height:32px;background:rgba(255,255,255,.18);flex-shrink:0;}\n.logo-txt b{font-size:13px;font-weight:800;display:block;letter-spacing:1.5px;text-transform:uppercase;color:#fff;}\n.logo-txt span{font-size:10px;color:var(--silver);letter-spacing:1.5px;}\n.home-h1{font-size:28px;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:4px;z-index:1;width:100%;max-width:380px;}\n.home-h1 em{color:var(--orange);font-style:normal;}\n.home-sub{font-size:12px;color:var(--silver);margin-bottom:18px;z-index:1;width:100%;max-width:380px;}\n.upload-area{width:100%;max-width:380px;border:2px dashed rgba(243,111,33,.4);border-radius:14px;padding:14px;cursor:pointer;background:rgba(243,111,33,.05);position:relative;z-index:1;margin-bottom:14px;transition:all .2s;}\n.upload-area.filled{border-style:solid;border-color:rgba(243,111,33,.65);}\n.upload-preview{width:100%;height:150px;object-fit:cover;border-radius:9px;display:none;}\n.upload-preview.show{display:block;}\n.upload-ph{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 0;}\n.upload-ph.hide{display:none;}\n.upload-ph-icon{font-size:26px;}\n.upload-ph-text{font-size:13px;font-weight:800;color:var(--orange);}\n.upload-ph-hint{font-size:11px;color:var(--silver);}\n.upload-change{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:none;}\n.upload-area.filled .upload-change{display:block;}\n#file-input{display:none;}\n.name-wrap{width:100%;max-width:380px;margin-bottom:14px;z-index:1;}\n.name-label{font-size:10px;font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:block;}\n.name-input{width:100%;background:var(--gray);border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;color:#fff;font-family:inherit;font-size:15px;font-weight:500;outline:none;transition:border-color .2s;}\n.name-input:focus{border-color:var(--orange);}\n.name-input::placeholder{color:rgba(255,255,255,.2);}\n.rules-wrap{width:100%;max-width:380px;background:var(--gray);border-radius:13px;padding:13px;margin-bottom:18px;z-index:1;border:1px solid var(--border);}\n.rules-head{font-size:10px;font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}\n.rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}\n.rc{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 5px;text-align:center;}\n.rc-s{font-size:18px;font-weight:900;color:var(--orange);line-height:1;}\n.rc-t{font-size:9px;color:var(--silver);margin-top:2px;font-weight:600;}\n.btn-start{width:100%;max-width:380px;background:linear-gradient(135deg,var(--orange) 0%,var(--orange-2) 100%);color:#fff;border:none;border-radius:13px;padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;z-index:1;transition:all .2s;letter-spacing:1px;box-shadow:0 8px 20px -6px rgba(243,111,33,.5);}\n.btn-start:hover:not(:disabled){transform:translateY(-1px);}\n.btn-start:disabled{background:#2a2954;color:var(--silver);cursor:not-allowed;box-shadow:none;}\n.lb-link{margin-top:10px;background:none;border:1.5px solid var(--border);color:var(--silver);border-radius:13px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;max-width:380px;z-index:1;}\n\n/* PREVIEW */\n#s-preview{background:var(--dark);position:relative;}\n#s-preview::before{content:'';position:absolute;inset:0;\n  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(48,47,126,.6) 0%,transparent 65%),\n  radial-gradient(ellipse 60% 40% at 50% 100%,rgba(243,111,33,.18) 0%,transparent 60%);\n  pointer-events:none;}\n.prev-body{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;position:relative;z-index:1;}\n.prev-card{\n  background:rgba(255,255,255,.025);\n  border-radius:18px;border:1.5px solid rgba(255,255,255,.10);\n  padding:6px;\n  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 16px 50px -16px rgba(0,0,0,.7);\n  position:relative;\n}\n.prev-img{display:block;width:100%;height:100%;border-radius:12px;object-fit:cover;}\n\n/* UNIFIED APP HEADER + FOOTER (preview + game) */\n.app-hud{\n  padding:14px 22px;\n  display:flex;align-items:center;justify-content:space-between;\n  gap:14px;flex-shrink:0;position:relative;z-index:5;\n}\n.hud-side{display:flex;align-items:center;gap:10px;min-width:130px;}\n.hud-side.right{justify-content:flex-end;}\n.hud-center{flex:1;text-align:center;line-height:1.15;}\n.hud-pretitle{font-size:10px;letter-spacing:.3em;color:rgba(255,255,255,.55);text-transform:uppercase;font-weight:700;margin-bottom:3px;}\n.hud-title{font-size:18px;letter-spacing:.08em;color:#fff;text-transform:uppercase;font-weight:900;}\n.hud-timer-pill{\n  display:inline-flex;align-items:center;gap:6px;\n  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);\n  border-radius:11px;padding:7px 13px;backdrop-filter:blur(4px);\n}\n.hud-progress-pill{\n  display:inline-flex;align-items:center;gap:6px;\n  background:rgba(243,111,33,.12);border:1px solid rgba(243,111,33,.35);\n  border-radius:11px;padding:6px 13px;color:var(--orange);font-weight:800;font-size:14px;letter-spacing:.04em;\n}\n.app-footer{padding:12px 16px 16px;text-align:center;font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.2em;text-transform:uppercase;font-weight:600;flex-shrink:0;position:relative;z-index:5;}\n.app-footer b{color:var(--orange);font-weight:900;}\n\n/* GAME */\n#s-game{background:var(--dark);overflow:hidden;position:relative;}\n#s-game::before{content:'';position:absolute;inset:0;\n  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(48,47,126,.6) 0%,transparent 65%),\n  radial-gradient(ellipse 60% 40% at 50% 100%,rgba(243,111,33,.15) 0%,transparent 60%);\n  pointer-events:none;}\n.hud-t-val{font-size:19px;font-weight:900;font-variant-numeric:tabular-nums;color:#fff;transition:color .3s;}\n.hud-t-val.warn{color:#ffbd6b;}\n.hud-t-val.danger{color:var(--orange);animation:blink .5s infinite;}\n@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}\n.hud-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);padding:5px 11px;border-radius:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid rgba(255,255,255,.08);}\n\n.game-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 14px;overflow:hidden;position:relative;z-index:1;}\n\n/* BOARD — framed card matching preview */\n#board-zone{position:relative;background:rgba(255,255,255,.025);border-radius:18px;border:1.5px solid rgba(255,255,255,.10);flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 16px 50px -16px rgba(0,0,0,.7);padding:6px;overflow:visible;}\n#board-inner{position:relative;width:100%;height:100%;overflow:visible;border-radius:12px;}\n#board-zone.drag-over{border-color:var(--orange);}\n.snap-ghost{position:absolute;pointer-events:none;z-index:2;display:none;}\n\n/* Piece pop-in animation when game starts */\n@keyframes pieceIn{from{opacity:0;transform:scale(.4) rotate(var(--rot,0deg));}to{opacity:1;transform:scale(1) rotate(0deg);}}\n.board-piece.popin{animation:pieceIn .55s cubic-bezier(.5,1.8,.4,1) backwards;}\n\n/* Drag ghost */\n#drag-ghost{position:fixed;pointer-events:none;z-index:99999;display:none;transform-origin:center;}\n\n/* RESULT */\n#s-result{align-items:center;background:var(--dark);overflow-y:auto;}\n.res-bar{width:100%;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;background:var(--gray);border-bottom:1px solid var(--border);flex-shrink:0;}\n.res-bar-t{font-size:16px;font-weight:800;}\n.res-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.08em;}\n.res-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;}\n.res-emoji{font-size:68px;margin-bottom:10px;}\n.res-pts{font-size:84px;font-weight:900;color:var(--orange);line-height:1;letter-spacing:-.04em;text-shadow:0 4px 30px rgba(243,111,33,.4);}\n.res-pts-lbl{font-size:17px;font-weight:700;margin-bottom:3px;}\n.res-who{font-size:13px;color:var(--silver);margin-bottom:18px;}\n.res-tc{display:flex;align-items:center;gap:11px;background:var(--gray);border-radius:13px;padding:13px 20px;border:1px solid var(--border);margin-bottom:24px;}\n.res-tc-val{font-size:25px;font-weight:900;}\n.res-tc-lbl{font-size:10px;color:var(--silver);font-weight:600;}\n.res-btns{width:100%;max-width:320px;display:flex;flex-direction:column;gap:9px;}\n.btn-rp{background:linear-gradient(135deg,var(--orange) 0%,var(--orange-2) 100%);color:#fff;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 8px 20px -6px rgba(243,111,33,.5);}\n.btn-rs{background:var(--gray);border:1.5px solid var(--border);color:#fff;border-radius:12px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}\n\n/* LEADERBOARD */\n#s-lb{background:var(--dark);overflow:hidden;}\n.lb-top{padding:13px 15px;display:flex;align-items:center;gap:9px;background:var(--gray);border-bottom:1px solid var(--border);flex-shrink:0;}\n.lb-back{background:none;border:none;color:var(--silver);font-size:22px;cursor:pointer;padding:0;line-height:1;}\n.lb-top-t{font-size:16px;font-weight:800;flex:1;}\n.lb-top-s{font-size:11px;color:var(--silver);}\n.lb-body{flex:1;overflow-y:auto;padding:13px;}\n.lb-empty{text-align:center;color:var(--silver);padding:50px 20px;font-size:14px;}\n.lb-item{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:12px;margin-bottom:7px;background:var(--gray);border:1px solid var(--border);}\n.lb-item.r1{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.3);}\n.lb-item.r2{background:rgba(168,168,168,.08);border-color:rgba(168,168,168,.2);}\n.lb-item.r3{background:rgba(205,127,50,.08);border-color:rgba(205,127,50,.2);}\n.lb-rank{font-size:20px;min-width:28px;text-align:center;font-weight:900;}\n.lb-rank.r1{color:var(--gold);}\n.lb-rank.r2{color:#aaa;}\n.lb-rank.r3{color:#CD7F32;}\n.lb-rank.rn{color:rgba(255,255,255,.3);font-size:13px;}\n.lb-info{flex:1;}\n.lb-iname{font-size:14px;font-weight:700;}\n.lb-idetail{font-size:11px;color:var(--silver);margin-top:2px;}\n.lb-iscore{text-align:right;}\n.lb-isn{font-size:22px;font-weight:900;color:var(--orange);line-height:1;}\n.lb-isl{font-size:10px;color:var(--silver);font-weight:600;}\n.lb-footer{padding:11px 13px;flex-shrink:0;}\n.btn-clr{width:100%;background:none;border:1.5px solid rgba(243,111,33,.3);color:var(--orange);border-radius:12px;padding:11px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}\n\n#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}\n.cp{position:absolute;top:-16px;animation:cffall linear forwards;}\n@keyframes cffall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- HOME -->\n<div id=\"s-home\" class=\"screen active\">\n  <div class=\"home-logo\">\n    <img src=\"1369eaf5-a4b1-4a9e-b2a7-bb06ee62a990\" alt=\"SHB\">\n    <div class=\"logo-divider\"><\u002Fdiv>\n    <div class=\"logo-txt\"><b>Puzzle<\u002Fb><span>Ngân hàng Sài Gòn – Hà Nội<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <h1 class=\"home-h1\">SHB <em>Puzzle<\u002Fem> Challenge<\u002Fh1>\n  <p class=\"home-sub\">Ghép tranh 4×3 trong 120 giây · Nhanh hơn = Điểm cao hơn<\u002Fp>\n  <div class=\"upload-area\" id=\"upload-area\" onclick=\"document.getElementById('file-input').click()\">\n    <img class=\"upload-preview\" id=\"upload-preview\" alt=\"\">\n    <div class=\"upload-ph\" id=\"upload-ph\">\n      <div class=\"upload-ph-icon\">🖼️<\u002Fdiv>\n      <div class=\"upload-ph-text\">Tải ảnh lên<\u002Fdiv>\n      <div class=\"upload-ph-hint\">Nhấn để chọn từ thiết bị<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"upload-change\">✏️ Đổi ảnh<\u002Fdiv>\n  <\u002Fdiv>\n  <input type=\"file\" id=\"file-input\" accept=\"image/*\">\n  <div class=\"name-wrap\">\n    <label class=\"name-label\">Tên người chơi<\u002Flabel>\n    <input type=\"text\" class=\"name-input\" id=\"player-name\" placeholder=\"Nhập tên của bạn...\" maxlength=\"30\">\n  <\u002Fdiv>\n  <div class=\"rules-wrap\">\n    <div class=\"rules-head\">📊 Bảng điểm<\u002Fdiv>\n    <div class=\"rules-grid\">\n      <div class=\"rc\"><div class=\"rc-s\">5đ<\u002Fdiv><div class=\"rc-t\">&lt; 30s<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"rc-s\">4đ<\u002Fdiv><div class=\"rc-t\">30–40s<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"rc-s\">3đ<\u002Fdiv><div class=\"rc-t\">40–50s<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"rc-s\">2đ<\u002Fdiv><div class=\"rc-t\">50–60s<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"rc-s\">1đ<\u002Fdiv><div class=\"rc-t\">60–120s<\u002Fdiv><\u002Fdiv>\n      <div class=\"rc\"><div class=\"rc-s\" style=\"color:var(--silver)\">0đ<\u002Fdiv><div class=\"rc-t\">Không xong<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"btn-start\" id=\"btn-start\" disabled=\"\" onclick=\"doStart()\">🎮 Bắt đầu chơi<\u002Fbutton>\n  <button class=\"lb-link\" onclick=\"showLB()\">🏆 Bảng xếp hạng<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- PREVIEW -->\n<div id=\"s-preview\" class=\"screen\">\n  <div class=\"app-hud\">\n    <div class=\"hud-side\"><\u002Fdiv>\n    <div class=\"hud-center\">\n      <div class=\"hud-pretitle\">Phần thi xếp hình<\u002Fdiv>\n      <div class=\"hud-title\">Chuẩn bị xếp hình logo<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hud-side right\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"prev-body\">\n    <div class=\"prev-card\" id=\"prev-card\">\n      <img class=\"prev-img\" id=\"prev-img\" alt=\"\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"app-footer\">Bắt đầu sau <b id=\"prev-cd\">5<\u002Fb>s — ghi nhớ hình ảnh<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- GAME -->\n<div id=\"s-game\" class=\"screen\">\n  <div class=\"app-hud\">\n    <div class=\"hud-side\">\n      <div class=\"hud-timer-pill\">\n        <span style=\"font-size:13px\">⏱<\u002Fspan>\n        <span class=\"hud-t-val\" id=\"hud-time\">2:00<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hud-center\">\n      <div class=\"hud-pretitle\">Phần thi xếp hình<\u002Fdiv>\n      <div class=\"hud-title\">Xếp hình logo<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hud-side right\">\n      <span class=\"hud-name\" id=\"hud-name\"><\u002Fspan>\n      <div class=\"hud-progress-pill\"><span id=\"hud-count\">0/12<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"game-area\" id=\"game-area\">\n    <div id=\"board-zone\">\n      <div id=\"board-inner\">\n        <canvas id=\"snap-ghost-canvas\" style=\"position:absolute;top:0;left:0;pointer-events:none;z-index:50;\"><\u002Fcanvas>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"app-footer\">Kéo một mảnh đặt lên mảnh khác để đổi vị trí<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- drag ghost -->\n<canvas id=\"drag-ghost\"><\u002Fcanvas>\n\n<!-- RESULT -->\n<div id=\"s-result\" class=\"screen\">\n  <div class=\"res-bar\">\n    <div class=\"res-bar-t\">Kết quả<\u002Fdiv>\n    <div class=\"res-badge\" id=\"res-badge\">SHB<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"res-body\">\n    <div class=\"res-emoji\" id=\"res-emoji\">🎉<\u002Fdiv>\n    <div class=\"res-pts\" id=\"res-pts\">0<\u002Fdiv>\n    <div class=\"res-pts-lbl\">điểm<\u002Fdiv>\n    <div class=\"res-who\" id=\"res-who\"><\u002Fdiv>\n    <div class=\"res-tc\">\n      <span style=\"font-size:22px\">⏱<\u002Fspan>\n      <div><div class=\"res-tc-val\" id=\"res-time\">—<\u002Fdiv><div class=\"res-tc-lbl\">Thời gian hoàn thành<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"res-btns\">\n      <button class=\"btn-rp\" onclick=\"doPlayAgain()\">🔄 Chơi lại<\u002Fbutton>\n      <button class=\"btn-rs\" onclick=\"showLB()\">🏆 Bảng xếp hạng<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- LEADERBOARD -->\n<div id=\"s-lb\" class=\"screen\">\n  <div class=\"lb-top\">\n    <button class=\"lb-back\" onclick=\"showScreen('s-home')\">←<\u002Fbutton>\n    <div class=\"lb-top-t\">🏆 Bảng Xếp Hạng<\u002Fdiv>\n    <div class=\"lb-top-s\" id=\"lb-sub\">—<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"lb-body\" id=\"lb-body\"><\u002Fdiv>\n  <div class=\"lb-footer\"><button class=\"btn-clr\" onclick=\"clearLB()\">🗑 Xóa bảng xếp hạng<\u002Fbutton><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"confetti\"><\u002Fdiv>\n\n<script>\n// ================================================================\n//  CONSTANTS\n// ================================================================\nconst COLS=4, ROWS=3, N=12;\n// TAB size as fraction of piece size\nconst TAB=0.3; // how far the \"knob\" protrudes\nconst TAB_INNER=0.05; // neck width factor\n\n// ================================================================\n//  STATE\n// ================================================================\nlet srcImg=null, srcDataURL=null;\nlet playerName='';\nlet pieceW=0, pieceH=0;     // board piece pixel size\nlet boardW=0, boardH=0;\nlet PIECE_RENDER_W=0, PIECE_RENDER_H=0; // canvas size including tab overflow\n\n// edges[row][col][side]: 1=tab out, -1=tab in\n// sides: 0=top,1=right,2=bottom,3=left\n// shared edges stored once: horizontal[r][c]=top of piece(r,c) = bottom of piece(r-1,c)\nlet hEdges=[], vEdges=[];  // hEdges[r][c] = edge between row r-1 and r at col c; vEdges[r][c]=edge between col c-1 and c at row r\n\nlet pieceCanvases=[]; // pre-rendered canvas for each piece (with jigsaw shape, includes tab overflow)\nlet trayCanvases=[];  // smaller canvases for tray display\n\n// boardPieces[slot] = pieceIdx (always populated — 12 pieces shuffled on board)\nlet boardPieces=new Array(N).fill(null);\n\nlet correctCount=0, timeLeft=120, gameTimer=null, startTime=null, gameEnded=false;\n\n// drag state\nlet drag=null;\n// drag={pieceIdx, fromTray(int|null), fromBoard(int|null), ghostCanvas, ghostW, ghostH, curX, curY}\n\n// ================================================================\n//  UTILS\n// ================================================================\nfunction showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}\nfunction shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}\nfunction esc(s){return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;');}\nfunction getLB(){try{return JSON.parse(localStorage.getItem('shb_lb')||'[]')}catch{return[]}}\nfunction saveLB(lb){localStorage.setItem('shb_lb',JSON.stringify(lb));}\nfunction calcScore(t,done){if(!done)return 0;if(t<30)return 5;if(t<40)return 4;if(t<50)return 3;if(t<60)return 2;return 1;}\nfunction fmtTime(s){const m=Math.floor(s/60),sec=s%60;return m>0?`${m}m ${sec}s`:`${sec}s`;}\nfunction checkReady(){const ok=srcImg&&document.getElementById('player-name').value.trim();document.getElementById('btn-start').disabled=!ok;}\n\n// ================================================================\n//  JIGSAW PATH MATH\n// ================================================================\n// Generate edge map for full puzzle\nfunction generateEdges(){\n  hEdges=[];\n  // hEdges[r][c]: direction of tab between row r-1 and row r, col c\n  // r from 1..ROWS-1, c from 0..COLS-1\n  for(let r=0;r<ROWS+1;r++){\n    hEdges[r]=[];\n    for(let c=0;c<COLS;c++){\n      if(r===0||r===ROWS) hEdges[r][c]=0; // border = flat\n      else hEdges[r][c]=(Math.random()<0.5)?1:-1;\n    }\n  }\n  vEdges=[];\n  // vEdges[r][c]: direction of tab between col c-1 and col c, row r\n  for(let r=0;r<ROWS;r++){\n    vEdges[r]=[];\n    for(let c=0;c<COLS+1;c++){\n      if(c===0||c===COLS) vEdges[r][c]=0;\n      else vEdges[r][c]=(Math.random()<0.5)?1:-1;\n    }\n  }\n}\n\n// Get edge directions for piece at (row,col)\n// returns {top,right,bottom,left} where 1=knob sticks OUT of this piece, -1=knob goes IN\nfunction getPieceEdges(row,col){\n  return {\n    top:   hEdges[row][col],      // top edge: 0=border, else from hEdges\n    bottom: -hEdges[row+1][col],  // bottom: flipped for this piece\n    left:  vEdges[row][col],\n    right: -vEdges[row][col+1]\n  };\n}\n\n// Draw jigsaw path on ctx — each edge interlocks with neighbor\n// ox,oy = offset inside canvas (to leave room for tab overflow)\n// w,h = core piece size (without tab)\n// edges = {top,right,bottom,left} where +1 = knob OUT, -1 = knob IN, 0 = flat\nfunction jigsawPath(ctx, ox, oy, w, h, edges){\n  ctx.beginPath();\n  ctx.moveTo(ox, oy);\n\n  // For each edge, pass tab=-edges.X to jigsawEdge because of CCW-vs-CW\n  // convention in screen coords (+y down). After working out the geometry,\n  // all four edges need the negation to make +1 → OUTWARD.\n  jigsawEdge(ctx, ox,   oy,   ox+w, oy,   -edges.top);\n  jigsawEdge(ctx, ox+w, oy,   ox+w, oy+h, -edges.right);\n  jigsawEdge(ctx, ox+w, oy+h, ox,   oy+h, -edges.bottom);\n  jigsawEdge(ctx, ox,   oy+h, ox,   oy,   -edges.left);\n\n  ctx.closePath();\n}\n\n// Draw one classic jigsaw edge from (x1,y1) to (x2,y2) using TRUE circular arcs\n// tab: 0 = straight; +1/-1 chooses which side the knob protrudes\nfunction jigsawEdge(ctx, x1, y1, x2, y2, tab){\n  if(tab===0){ ctx.lineTo(x2,y2); return; }\n\n  const dx=x2-x1, dy=y2-y1;\n  const L=Math.hypot(dx,dy);\n  const tx=dx/L, ty=dy/L;\n  const nx=-ty*tab, ny=tx*tab;\n\n  const r = L*0.22;             // knob radius (rounder if bigger)\n  const offset = r*0.42;        // distance from edge to circle center (0=semicircle, <r=undercut neck)\n  const neckHalf = Math.sqrt(Math.max(0, r*r - offset*offset));\n\n  const mx=(x1+x2)/2, my=(y1+y2)/2;\n  const kx=mx+nx*offset, ky=my+ny*offset;\n\n  // Neck endpoints (where the knob circle meets the edge)\n  const n1x=mx-tx*neckHalf, n1y=my-ty*neckHalf;\n  const n2x=mx+tx*neckHalf, n2y=my+ty*neckHalf;\n\n  // Approach knob along the edge\n  ctx.lineTo(n1x, n1y);\n\n  // Arc through the apex (longest path — through +normal direction)\n  const a1 = Math.atan2(n1y-ky, n1x-kx);\n  const a2 = Math.atan2(n2y-ky, n2x-kx);\n  ctx.arc(kx, ky, r, a1, a2, false);\n\n  ctx.lineTo(x2, y2);\n}\n\n// (legacy drawEdge kept as stub — not used by the new path code)\nfunction drawEdge(){/* deprecated — see jigsawEdge */}\n\n// ================================================================\n//  ROUNDED RECT PATH\n// ================================================================\nfunction roundedRectPath(ctx,x,y,w,h,r){\n  r=Math.min(r,w/2,h/2);\n  ctx.beginPath();\n  ctx.moveTo(x+r,y);\n  ctx.lineTo(x+w-r,y);\n  ctx.arcTo(x+w,y,x+w,y+r,r);\n  ctx.lineTo(x+w,y+h-r);\n  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);\n  ctx.lineTo(x+r,y+h);\n  ctx.arcTo(x,y+h,x,y+h-r,r);\n  ctx.lineTo(x,y+r);\n  ctx.arcTo(x,y,x+r,y,r);\n  ctx.closePath();\n}\n\n// ================================================================\n//  PRE-RENDER PIECES (jigsaw shape with interlocking tabs)\n// ================================================================\nfunction preRenderPieces(){\n  generateEdges();\n  pieceCanvases=[];\n\n  // Max protrusion = offset+r = 0.42*r + r = 1.42*r where r=0.22*L\n  // → max ~0.32*L. Use 0.35*L for safety margin.\n  const overhang = Math.max(pieceW, pieceH)*0.35 + 4;\n  const OX = overhang, OY = overhang;\n  PIECE_RENDER_W = pieceW + overhang*2;\n  PIECE_RENDER_H = pieceH + overhang*2;\n\n  for(let i=0;i<N;i++){\n    const col=i%COLS, row=Math.floor(i/COLS);\n    const c=document.createElement('canvas');\n    c.width=PIECE_RENDER_W; c.height=PIECE_RENDER_H;\n    const ctx=c.getContext('2d');\n\n    const edges=getPieceEdges(row,col);\n\n    // Clip to jigsaw shape\n    jigsawPath(ctx, OX, OY, pieceW, pieceH, edges);\n    ctx.save();\n    ctx.clip();\n\n    // Draw image slice with extra padding so tabs are filled with image content\n    const iw=srcImg.naturalWidth, ih=srcImg.naturalHeight;\n    const sw=iw/COLS, sh=ih/ROWS;\n    const scaleX=pieceW/sw, scaleY=pieceH/sh;\n    const extraX=OX/scaleX, extraY=OY/scaleY;\n    ctx.drawImage(srcImg,\n      col*sw - extraX, row*sh - extraY,\n      sw + extraX*2, sh + extraY*2,\n      0, 0,\n      PIECE_RENDER_W, PIECE_RENDER_H\n    );\n\n    ctx.restore();\n    // No outline — pieces look seamless when correctly assembled\n\n    pieceCanvases.push(c);\n  }\n}\n\n// ================================================================\n//  HOME / UPLOAD\n// ================================================================\ndocument.getElementById('file-input').addEventListener('change',e=>{\n  const f=e.target.files[0];if(!f)return;\n  const r=new FileReader();\n  r.onload=ev=>{\n    srcDataURL=ev.target.result;\n    const img=new Image();\n    img.onload=()=>{\n      srcImg=img;\n      document.getElementById('upload-preview').src=srcDataURL;\n      document.getElementById('upload-preview').classList.add('show');\n      document.getElementById('upload-ph').classList.add('hide');\n      document.getElementById('upload-area').classList.add('filled');\n      checkReady();\n    };\n    img.src=srcDataURL;\n  };\n  r.readAsDataURL(f);\n});\ndocument.getElementById('player-name').addEventListener('input',checkReady);\n\n// Default image\n(function(){\n  const c=document.createElement('canvas');c.width=400;c.height=300;\n  const ctx=c.getContext('2d');\n  const g=ctx.createLinearGradient(0,0,400,300);\n  g.addColorStop(0,'#302f7e');g.addColorStop(1,'#15143d');\n  ctx.fillStyle=g;ctx.fillRect(0,0,400,300);\n  // soft orange glow\n  const og=ctx.createRadialGradient(320,80,10,320,80,200);\n  og.addColorStop(0,'rgba(243,111,33,0.45)');og.addColorStop(1,'rgba(243,111,33,0)');\n  ctx.fillStyle=og;ctx.fillRect(0,0,400,300);\n  ctx.fillStyle='rgba(255,255,255,0.04)';\n  for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(i*60-20,150,80,0,Math.PI*2);ctx.fill();}\n  ctx.fillStyle='white';ctx.font='bold 90px Arial Black';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SHB',200,120);\n  ctx.font='bold 18px Arial';ctx.fillText('Ngân hàng Sài Gòn – Hà Nội',200,185);\n  ctx.font='500 13px Arial';ctx.fillStyle='#f36f21';ctx.fillText('Puzzle Challenge',200,215);\n  srcDataURL=c.toDataURL();\n  const img=new Image();img.onload=()=>{srcImg=img;};img.src=srcDataURL;\n  document.getElementById('upload-preview').src=srcDataURL;\n  document.getElementById('upload-preview').classList.add('show');\n  document.getElementById('upload-ph').classList.add('hide');\n  document.getElementById('upload-area').classList.add('filled');\n  checkReady();\n})();\n\n// ================================================================\n//  START → PREVIEW\n// ================================================================\nfunction doStart(){\n  playerName=document.getElementById('player-name').value.trim();\n  if(!playerName||!srcImg)return;\n  document.getElementById('prev-img').src=srcDataURL;\n  showScreen('s-preview');\n  // Size preview card to match where the board will be\n  requestAnimationFrame(sizePreviewCard);\n  let cd=5;\n  const numEl=document.getElementById('prev-cd');\n  numEl.textContent=cd;\n  const iv=setInterval(()=>{cd--;numEl.textContent=cd;if(cd<=0){clearInterval(iv);launchGame();}},1000);\n}\n\nfunction sizePreviewCard(){\n  const body=document.querySelector('.prev-body');\n  const card=document.getElementById('prev-card');\n  if(!body||!card)return;\n  const aH=body.clientHeight, aW=body.clientWidth;\n  const [bW,bH]=fitBoardSize(aW,aH);\n  card.style.width=bW+'px';\n  card.style.height=bH+'px';\n}\n\nfunction fitBoardSize(availW,availH){\n  // Match board sizing logic — give margins\n  const maxW=Math.min(availW*0.78, 880);\n  const maxH=availH*0.92;\n  let bW=maxW, bH=Math.round(bW*ROWS/COLS);\n  if(bH>maxH){bH=maxH;bW=Math.round(bH*COLS/ROWS);}\n  return [Math.round(bW),Math.round(bH)];\n}\n\n// ================================================================\n//  LAUNCH GAME\n// ================================================================\nfunction launchGame(){\n  showScreen('s-game');\n  document.getElementById('hud-name').textContent=playerName;\n\n  // ===== LANDSCAPE-FRIENDLY LAYOUT: board centered, with margins =====\n  const area=document.getElementById('game-area');\n  const aH=area.clientHeight, aW=area.clientWidth;\n\n  // Account for board-zone's 6px padding (frame around inner content)\n  const FRAME=6;\n  const [outerW,outerH]=fitBoardSize(aW,aH);\n  const innerW=outerW-FRAME*2, innerH=outerH-FRAME*2;\n  boardW=innerW;boardH=innerH;\n  pieceW=Math.floor(innerW/COLS);pieceH=Math.floor(innerH/ROWS);\n  // Recompute outer to match piece grid exactly\n  const realInnerW=pieceW*COLS, realInnerH=pieceH*ROWS;\n\n  const bz=document.getElementById('board-zone');\n  bz.style.width=(realInnerW+FRAME*2)+'px';\n  bz.style.height=(realInnerH+FRAME*2)+'px';\n  const bi=document.getElementById('board-inner');\n  bi.style.width=realInnerW+'px';\n  bi.style.height=realInnerH+'px';\n\n  // Ghost canvas\n  const gc=document.getElementById('snap-ghost-canvas');\n  gc.width=realInnerW;gc.height=realInnerH;\n\n  // Reset state\n  correctCount=0;gameEnded=false;timeLeft=120;drag=null;\n  document.getElementById('hud-count').textContent='0/12';\n\n  // Pre-render piece canvases\n  preRenderPieces();\n\n  // Shuffle pieces directly onto board (no tray)\n  // Try to avoid starting with pieces already in correct position\n  let attempt=0;\n  do{\n    boardPieces=shuffle(Array.from({length:N},(_,i)=>i));\n    attempt++;\n  } while(attempt<8 && boardPieces.some((p,i)=>p===i));\n\n  // Render with pop-in animation\n  renderBoard(true);\n\n  setupEvents();\n  startTimer();\n}\n\n// ================================================================\n//  RENDER TRAY (removed in new flow — pieces live on the board)\n// ================================================================\nfunction renderTray(){/* no-op */}\n\n// ================================================================\n//  RENDER BOARD\n// ================================================================\nfunction renderBoard(animate){\n  const bi=document.getElementById('board-inner');\n  // remove existing piece canvases\n  bi.querySelectorAll('.board-piece').forEach(el=>el.remove());\n\n  const overhang=Math.max(pieceW,pieceH)*0.35+4;\n\n  for(let i=0;i<N;i++){\n    if(boardPieces[i]===null)continue;\n    const pi=boardPieces[i];\n    const col=i%COLS, row=Math.floor(i/COLS);\n    const sx=col*pieceW, sy=row*pieceH;\n\n    const c=document.createElement('canvas');\n    c.width=PIECE_RENDER_W;c.height=PIECE_RENDER_H;\n    c.className='board-piece'+(animate?' popin':'');\n    c.dataset.board=i;\n    c.dataset.piece=pi;\n    if(animate){\n      const rot=(Math.random()*40-20)+'deg';\n      c.style.setProperty('--rot',rot);\n      c.style.animationDelay=(Math.random()*0.35)+'s';\n    }\n    c.style.cssText+=`\n      position:absolute;\n      left:${sx-overhang}px;top:${sy-overhang}px;\n      width:${PIECE_RENDER_W}px;height:${PIECE_RENDER_H}px;\n      cursor:grab;\n      pointer-events:auto;\n      touch-action:none;\n      z-index:5;\n      filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));\n      transform-origin:center;\n    `;\n    const ctx=c.getContext('2d');\n    ctx.drawImage(pieceCanvases[pi],0,0);\n    bi.appendChild(c);\n  }\n}\n\n// ================================================================\n//  DRAG & DROP\n// ================================================================\nlet evListeners=[];\nfunction setupEvents(){\n  cleanupEvents();\n  const add=(el,ev,fn,opt)=>{el.addEventListener(ev,fn,opt);evListeners.push({el,ev,fn});};\n  add(document,'mousedown',onDown,{passive:false});\n  add(document,'touchstart',onDown,{passive:false});\n  add(document,'mousemove',onMove,{passive:false});\n  add(document,'touchmove',onMove,{passive:false});\n  add(document,'mouseup',onUp,{passive:false});\n  add(document,'touchend',onUp,{passive:false});\n}\nfunction cleanupEvents(){\n  evListeners.forEach(({el,ev,fn})=>el.removeEventListener(ev,fn));\n  evListeners=[];\n}\nfunction getXY(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}\n\nfunction onDown(e){\n  if(gameEnded)return;\n  const{x,y}=getXY(e);\n  const t=document.elementFromPoint(x,y);\n  if(!t)return;\n\n  // Board piece pickup\n  const bp=t.closest('.board-piece');\n  if(bp){\n    const bi=parseInt(bp.dataset.board);\n    const pi=parseInt(bp.dataset.piece);\n    e.preventDefault();\n    beginDrag(pi,null,bi,x,y);\n    return;\n  }\n}\n\nfunction beginDrag(pieceIdx,fromTray,fromBoard,x,y){\n  // Haptic feedback on pickup\n  if(navigator.vibrate)navigator.vibrate(8);\n\n  // Build ghost canvas at full jigsaw piece size with strong shadow\n  const gc=document.getElementById('drag-ghost');\n  const ghostW=PIECE_RENDER_W, ghostH=PIECE_RENDER_H;\n  gc.width=ghostW;gc.height=ghostH;\n  gc.style.cssText=`position:fixed;pointer-events:none;z-index:99999;width:${ghostW}px;height:${ghostH}px;filter:drop-shadow(0 12px 18px rgba(0,0,0,.7)) drop-shadow(0 0 14px rgba(243,111,33,.45));transform:scale(1.06);transition:transform .12s;`;\n  const gctx=gc.getContext('2d');\n  gctx.clearRect(0,0,gc.width,gc.height);\n  gctx.drawImage(pieceCanvases[pieceIdx],0,0);\n\n  drag={pieceIdx,fromTray,fromBoard,ghostW,ghostH};\n  moveDragGhost(x,y);\n\n  // Fade source on board\n  if(fromBoard!==null){\n    const el=document.querySelector(`.board-piece[data-board=\"${fromBoard}\"]`);\n    if(el){el.style.opacity='0.18';el.style.filter='none';}\n  }\n}\n\nfunction moveDragGhost(x,y){\n  const gc=document.getElementById('drag-ghost');\n  const w=drag?.ghostW||gc.width, h=drag?.ghostH||gc.height;\n  gc.style.left=(x-w/2)+'px';\n  gc.style.top=(y-h/2)+'px';\n}\n\nfunction onMove(e){\n  if(!drag)return;\n  e.preventDefault();\n  const{x,y}=getXY(e);\n  moveDragGhost(x,y);\n\n  // Show snap ghost\n  const slot=getSlotAt(x,y);\n  drawSnapGhost(slot);\n}\n\nfunction drawSnapGhost(slot){\n  const gc=document.getElementById('snap-ghost-canvas');\n  const ctx=gc.getContext('2d');\n  ctx.clearRect(0,0,gc.width,gc.height);\n  if(slot===null)return;\n  const col=slot%COLS, row=Math.floor(slot/COLS);\n  const sx=col*pieceW, sy=row*pieceH;\n  const edges=getPieceEdges(row,col);\n  ctx.save();\n  jigsawPath(ctx, sx, sy, pieceW, pieceH, edges);\n  ctx.strokeStyle='rgba(243,111,33,0.95)';\n  ctx.lineWidth=3;\n  ctx.setLineDash([7,5]);\n  ctx.stroke();\n  ctx.setLineDash([]);\n  ctx.fillStyle='rgba(243,111,33,0.18)';\n  ctx.fill();\n  ctx.restore();\n}\n\nfunction onUp(e){\n  if(!drag)return;\n  const{x,y}=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};\n\n  // Clear ghost canvas\n  const gc=document.getElementById('snap-ghost-canvas');\n  gc.getContext('2d').clearRect(0,0,gc.width,gc.height);\n  document.getElementById('drag-ghost').style.left='-9999px';\n\n  const slot=getSlotAt(x,y);\n\n  if(slot!==null){\n    dropOnBoard(drag.pieceIdx,null,drag.fromBoard,slot);\n  } else {\n    restoreSource();\n  }\n  drag=null;\n}\n\nfunction getSlotAt(x,y){\n  const bi=document.getElementById('board-inner');\n  const r=bi.getBoundingClientRect();\n  if(x<r.left||x>r.right||y<r.top||y>r.bottom)return null;\n  const rx=x-r.left, ry=y-r.top;\n  const col=Math.floor(rx/pieceW), row=Math.floor(ry/pieceH);\n  if(col<0||col>=COLS||row<0||row>=ROWS)return null;\n  return row*COLS+col;\n}\n\nfunction dropOnBoard(pieceIdx,fromTray,fromBoard,toSlot){\n  // Swap two pieces on the board\n  const displaced=boardPieces[toSlot];\n  boardPieces[toSlot]=pieceIdx;\n  if(fromBoard!==null) boardPieces[fromBoard]=displaced;\n\n  // Haptic\n  if(navigator.vibrate) navigator.vibrate(10);\n\n  renderBoard();updateProgress();checkCompletion();\n}\n\nfunction returnToTray(){/* no tray in new flow */}\n\nfunction restoreSource(){renderBoard();}\n\n// ================================================================\n//  PROGRESS\n// ================================================================\nfunction updateProgress(){\n  correctCount=0;\n  for(let i=0;i<N;i++)if(boardPieces[i]===i)correctCount++;\n  document.getElementById('hud-count').textContent=`${correctCount}/12`;\n}\nfunction checkCompletion(){if(correctCount===N)endGame(true);}\n\n// ================================================================\n//  TIMER\n// ================================================================\nfunction startTimer(){\n  startTime=Date.now();updateTimerUI();\n  gameTimer=setInterval(()=>{timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(gameTimer);endGame(false);}},1000);\n}\nfunction updateTimerUI(){\n  const m=Math.floor(timeLeft/60),s=timeLeft%60;\n  const el=document.getElementById('hud-time');\n  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;\n  el.className='hud-t-val';\n  if(timeLeft<=10)el.classList.add('danger');\n  else if(timeLeft<=30)el.classList.add('warn');\n}\n\n// ================================================================\n//  END\n// ================================================================\nfunction endGame(completed){\n  if(gameEnded)return;gameEnded=true;clearInterval(gameTimer);cleanupEvents();\n  const elapsed=completed?Math.round((Date.now()-startTime)/1000):120;\n  const score=calcScore(elapsed,completed);\n  const lb=getLB();\n  lb.push({name:playerName,score,time:elapsed,done:completed,date:new Date().toLocaleDateString('vi-VN')});\n  lb.sort((a,b)=>b.score-a.score||a.time-b.time);saveLB(lb);\n  showResult(score,elapsed,completed);\n}\nfunction showResult(score,elapsed,completed){\n  showScreen('s-result');\n  const em={5:'🏆',4:'🥇',3:'🥈',2:'🥉',1:'👏',0:'😔'};\n  document.getElementById('res-emoji').textContent=em[score]||'🎯';\n  document.getElementById('res-pts').textContent=score;\n  document.getElementById('res-who').textContent=playerName;\n  document.getElementById('res-time').textContent=completed?fmtTime(elapsed):'Hết giờ';\n  document.getElementById('res-badge').textContent=completed?'✅ Hoàn thành':'⏰ Hết giờ';\n  if(score>=4)launchConfetti();\n}\n\n// ================================================================\n//  LEADERBOARD\n// ================================================================\nfunction showLB(){\n  showScreen('s-lb');\n  const lb=getLB();\n  document.getElementById('lb-sub').textContent=lb.length?`${lb.length} người`:'Chưa có ai';\n  const body=document.getElementById('lb-body');\n  if(!lb.length){body.innerHTML='<div class=\"lb-empty\">Chưa có kết quả.<br>Hãy là người đầu tiên! 🚀<\u002Fdiv>';return;}\n  body.innerHTML=lb.slice(0,10).map((e,i)=>{\n    const r=i+1,rc=r<=3?`r${r}`:'rn',re=r===1?'🥇':r===2?'🥈':r===3?'🥉':r;\n    return `<div class=\"lb-item ${r<=3?`r${r}`:''}\">\n      <div class=\"lb-rank ${rc}\">${re}<\u002Fdiv>\n      <div class=\"lb-info\"><div class=\"lb-iname\">${esc(e.name)}<\u002Fdiv><div class=\"lb-idetail\">⏱ ${e.done?fmtTime(e.time):'Không xong'} · ${e.date}<\u002Fdiv><\u002Fdiv>\n      <div class=\"lb-iscore\"><div class=\"lb-isn\">${e.score}<\u002Fdiv><div class=\"lb-isl\">điểm<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\nfunction clearLB(){if(confirm('Xóa toàn bộ?')){localStorage.removeItem('shb_lb');showLB();}}\nfunction doPlayAgain(){showScreen('s-home');document.getElementById('player-name').value=playerName;checkReady();}\n\n// ================================================================\n//  CONFETTI\n// ================================================================\nfunction launchConfetti(){\n  const w=document.getElementById('confetti');w.innerHTML='';\n  const cols=['#f36f21','#ffbd6b','#302f7e','#5b59c8','#22c55e','#fff'];\n  for(let i=0;i<70;i++){\n    const p=document.createElement('div');p.className='cp';\n    const sz=4+Math.random()*8;\n    p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()}s;`;\n    w.appendChild(p);\n  }\n  setTimeout(()=>w.innerHTML='',5000);\n}\n\nwindow.addEventListener('resize',()=>{\n  if(document.getElementById('s-game').classList.contains('active'))launchGame();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
